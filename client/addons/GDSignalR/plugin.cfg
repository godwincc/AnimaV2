[plugin]

name="GDSignalR"
description="A lightweight ASP.NET Core SignalR client for Godot 4.3+. Connects to a SignalR Hub over WebSocket using the JSON Hub Protocol. Supports fire-and-forget messages, awaited invocations, server-pushed callbacks, custom headers, bearer tokens, and automatic reconnection."
author="Henry Abraham"
version="1.0.0"
script="plugin.gd"
icon="icon.png"