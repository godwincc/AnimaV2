version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: anima-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anima
      POSTGRES_PASSWORD: anima_dev_password
      POSTGRES_DB: anima_dev
    ports:
      - "5432:5432"
    volumes:
      - anima_pg_data:/var/lib/postgresql/data

volumes:
  anima_pg_data: